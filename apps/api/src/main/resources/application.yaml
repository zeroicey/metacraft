app:
  storage:
    path: ${APP_STORAGE_PATH:data}
  template-path: ${TEMPLATE_PATH:data/templates}
  template-match-timeout: ${TEMPLATE_MATCH_TIMEOUT:3}
  template-match-model: ${TEMPLATE_MATCH_MODEL:qwen-turbo}
opencode:
  enabled: ${OPENCODE_ENABLED:true}
  command: ${OPENCODE_COMMAND:opencode}
  host: ${OPENCODE_HOST:127.0.0.1}
  port: ${OPENCODE_PORT:4096}
  username: ${OPENCODE_SERVER_USERNAME:opencode}
  password: ${OPENCODE_SERVER_PASSWORD:change-this-opencode-password}
  startup-timeout-millis: ${OPENCODE_STARTUP_TIMEOUT_MILLIS:15000}
  shutdown-timeout-millis: ${OPENCODE_SHUTDOWN_TIMEOUT_MILLIS:5000}
  inherit-io: ${OPENCODE_INHERIT_IO:true}
jwt:
  expiration: ${JWT_EXPIRATION:8640000000}
  secret: ${JWT_SECRET:change-this-secretfdsfas-key-in-produfasdftion-at-least-256-bits}
logging:
  level:
    com:
      metacraft:
        api: DEBUG
server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: metacraft-api
  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    password: ${DB_PASSWORD}
    url: ${DB_URL}
    username: ${DB_USERNAME}
  flyway:
    baseline-on-migrate: true
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  main:
    banner-mode: 'off'
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    operations-sorter: alpha

langchain4j:
  community:
    dashscope:
      chat-model:
        model-name: ${MODEL_NAME:qwen-plus}
        api-key: ${API_KEY}
      streaming-chat-model:
        model-name: ${MODEL_NAME:qwen-plus}
        api-key: ${API_KEY}
zhipu:
  api-key: ${ZHIPU_API_KEY}

yuanclaw:
  shared-room: ${YUANCLAW_SHARED_ROOM:shared}
  nanobot-token: ${YUANCLAW_NANOBOT_TOKEN:123456}